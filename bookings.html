<!DOCTYPE html>
<html>
<head>
<title>Bookings</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">

<img src="PCDS.png">

<h2>ADMIN</h2>

<a href="index.html">Dashboard</a>
<a href="bookings.html">Bookings</a>
<a href="login.html">Logout</a>

</div>

<div class="main">

<h1>Bookings Management</h1>

<div class="card">

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Event</th>
<th>Start</th>
<th>End</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

const API = "https://YOUR-RAILWAY-APP.up.railway.app";

/* ===================== LOAD BOOKINGS ===================== */
function load(){

fetch(`${API}/bookings`)
.then(res => res.json())
.then(bookings => {

let table = document.getElementById("table");
table.innerHTML = "";

bookings.forEach((b)=>{

let actions = "";

/* PENDING */
if(b.status === "Pending"){
actions = `
<button onclick="updateStatus(${b.id}, 'Approved')">Approve</button>
<button onclick="updateStatus(${b.id}, 'Disapproved')">Disapprove</button>
`;
}

/* APPROVED / DISAPPROVED */
else if(b.status === "Approved" || b.status === "Disapproved"){
actions = `
<button onclick="updateStatus(${b.id}, 'Completed')">Done</button>
`;
}

/* COMPLETED */
else{
actions = "";
}

table.innerHTML += `
<tr>
<td>${b.booking_id}</td>
<td>${b.booked_by}</td>
<td>${b.event_name}</td>
<td>${b.start_date}</td>
<td>${b.end_date}</td>
<td>${b.status}</td>
<td>
${actions}
<button onclick="deleteBooking(${b.id})">Delete</button>
</td>
</tr>
`;

});

});

}

/* ===================== UPDATE STATUS ===================== */
function updateStatus(id, status){

fetch(`${API}/status/${id}`, {
method: "PUT",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ status })
})
.then(() => load());

}

/* ===================== DELETE BOOKING ===================== */
function deleteBooking(id){

fetch(`${API}/delete/${id}`, {
method: "DELETE"
})
.then(() => load());

}

/* ===================== AUTO LOAD ===================== */
load();
setInterval(load, 3000);

</script>

</body>
</html>
